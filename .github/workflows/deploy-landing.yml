name: Deploy Landing to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - "landing/**"
      - "scripts/prepare-expo-web-pwa.mjs"
      - ".github/workflows/deploy-landing.yml"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: landing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            landing/package-lock.json
            frontend/package-lock.json

      - name: Install landing dependencies
        run: npm ci

      - name: Install app dependencies
        working-directory: frontend
        run: npm ci

      - name: Build landing
        env:
          VITE_BASE_PATH: /palpite/
        run: npm run build

      - name: Export Expo Web app
        working-directory: frontend
        env:
          EXPO_PUBLIC_API_URL: https://palpitai-api.onrender.com
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
        run: npm run export:web

      - name: Prepare Expo Web PWA
        working-directory: .
        env:
          EXPO_WEB_BASE_PATH: /palpite/app/
        run: node scripts/prepare-expo-web-pwa.mjs frontend/dist

      - name: Mount Expo Web app under landing
        working-directory: .
        run: |
          rm -rf landing/dist/app
          mkdir -p landing/dist/app
          cp -R frontend/dist/. landing/dist/app/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
